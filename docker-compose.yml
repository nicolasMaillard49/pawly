services:
  postgres:
    image: postgres:16-alpine
    container_name: geestock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: geestock_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geestock_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
